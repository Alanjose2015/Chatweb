<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video TikTok con Fondo Real</title>
    <style>
        /* Configuración de la pantalla formato TikTok (9:16) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- VIDEO / IMAGEN DE FONDO COMPLETO --- */
        .video-fondo {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 1;
            transform: translate(-50%, -50%);
            object-fit: cover; /* Asegura que llene la pantalla sin deformarse */
        }

        /* Capa oscura intermedia para que el texto resalte aún más */
        .capa-oscura {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35); /* Oscurece un 35% el fondo */
            z-index: 2;
        }

        /* --- CONTENEDOR Y ANIMACIÓN DE TEXTO --- */
        .contenedor-texto {
            position: relative;
            z-index: 3;
            width: 88%;
            text-align: center;
            color: #ffffff;
            font-size: 36px;
            font-weight: 700;
            line-height: 1.4;
            text-shadow: 0px 4px 20px rgba(0, 0, 0, 0.8);
        }

        /* Estilo base para cada frase */
        .frase {
            position: absolute;
            width: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: aparecerYDesaparecer 16s infinite ease-in-out;
        }

        /* Tiempos de aparición pausada (Duración total: 16 segundos) */
        .frase-1 { animation-delay: 0s; }
        .frase-2 { animation-delay: 4s; }
        .frase-3 { animation-delay: 8s; }
        .frase-4 { animation-delay: 12s; }

        /* Animación para que aparezcan suavemente y luego se vayan */
        @keyframes aparecerYDesaparecer {
            0%, 100% { opacity: 0; transform: translate(-50%, -45%); }
            5%, 20%  { opacity: 1; transform: translate(-50%, -50%); }
            25%      { opacity: 0; transform: translate(-50%, -55%); }
        }
    </style>
</head>
<body>

    <!-- VIDEO DE FONDO (Ocupa toda la pantalla) -->
    <!-- Puedes cambiar el enlace de 'src' por cualquier video tuyo en MP4 o un GIF animado -->
    <video class="video-fondo" autoplay loop muted playsinline>
        <source src="https://mixkit.co" type="video/mp4">
        Tu navegador no soporta videos.
    </video>

    <!-- Capa protectora para dar contraste al texto -->
    <div class="capa-oscura"></div>

    <!-- Capa de textos que corren pausadamente -->
    <div class="contenedor-texto">
        <div class="frase frase-1">¿Te has dado cuenta?<br>La gente bella halaga, la gente feliz celebra a los demás.</div>
        <div class="frase frase-2">Quien habla varios idiomas no se burla del acento ajeno.</div>
        <div class="frase frase-3">La gente verdaderamente espiritual no juzga: ora en silencio.</div>
        <div class="frase frase-4">La gente preparada comparte lo que sabe.<br><br>❤️ Guarda este video.</div>
    </div>

</body>
            </html>
